[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    ui: marks tests as UI tests (deselect with '-m "not ui"')
    smoke: marks tests as smoke tests (deselect with '-m "not smoke"')
    regression: marks tests as regression tests (deselect with '-m "not regression"')
    critical: marks tests as critical tests (deselect with '-m "not critical"')
    registration: marks tests related to user registration (deselect with '-m "not registration"')
    authorization: marks tests related to user authorization (deselect with '-m "not authorization"')
    courses: marks tests related to courses (deselect with '-m "not courses"')